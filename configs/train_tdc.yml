# ==============================
# 实验基本信息
# ==============================
name: TDC_LateFusion_Aplus_EventNorm_30ep

# ==============================
# 模型配置
# type 可选:
#   late_fusion  : 导师新版，只在 H/4 做一次 RGB-Q / Event-KV 融合
#   multiscale   : 旧版三尺度融合
#   attention    : 早期单尺度 attention baseline
#   concat       : 早期单尺度 concat baseline
#   no_event     : 只用 RGB 的 baseline
#
# late_fusion_mode 仅在 type=late_fusion 时生效:
#   cat             : 对照组，RGB / Event2D / EventTDC 直接 concat 融合
#   kv_2d_k_tdc_v   : A组，RGB->Q, Event2D->K, EventTDC->V
#   kv_2d_v_tdc_k   : B组，RGB->Q, EventTDC->K, Event2D->V
#   kv_merged       : C组，Event2D 和 EventTDC 先合成一路，再共同生成 K/V
#
# fusion_type / qkv_mode 仅在旧版 multiscale 时生效。
# ==============================
model:
  type: late_fusion
  base_dim: 32
  fusion_type: hybrid
  qkv_mode: rgb_qk_event_v
  late_fusion_mode: kv_2d_k_tdc_v_plus
  window_size: 8
  num_heads: 4
  qk_norm: false
  event_encoder_type: 2d
  attention_dim: 2d
  temporal_window: 2

# ==============================
# 损失函数配置
# type 可选: l1, charbonnier, charbonnier_edge
# ==============================
loss:
  type: l1
  edge_weight: 0.05

# ==============================
# 数据集路径配置
# ==============================
datasets:
  train:
    dataroot: E:/GOPRO/GOPRO/train
    patch_size: 256
    batch_size: 4
    num_workers: 2
    prefetch_factor: 4
    max_open_h5: 2
    norm_event: true
  val:
    dataroot: E:/GOPRO/GOPRO/test
    patch_size: 256
    max_open_h5: 2
    norm_event: true

# ==============================
# 训练参数
# ==============================
train:
  num_epochs: 30
  learning_rate: 0.0002

# ==============================
# 路径与断点续训
# ==============================
path:
  experiments_root: ./experiments
  resume_state: ~
