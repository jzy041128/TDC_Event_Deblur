# ==============================
# 实验基本信息
# ==============================
name: TDC_GoPro_Train

# ==============================
# 数据集路径配置 (GOPRO 架构)
# ==============================
datasets:
  train:
    dataroot: ./datasets/GOPRO/train
    batch_size: 8
    num_workers: 8
  val:
    dataroot: ./datasets/GOPRO/test 

# ==============================
# 训练参数
# ==============================
train:
  num_epochs: 100
  learning_rate: 0.0002

# ==============================
# 路径与断点续训 (核心升级！)
# ==============================
path:
  experiments_root: ./experiments
  resume_state: ~